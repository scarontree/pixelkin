name: Pixelkin
options:
  bundleIdPrefix: com.pixelkin
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  Pixelkin:
    type: application
    platform: macOS
    sources:
      - path: Pixelkin
        excludes:
          - "**/*.entitlements"
    resources:
      - path: Pixelkin/Resources/Assets.xcassets
      - path: Pixelkin/Resources/Skins
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pixelkin.app
        PRODUCT_NAME: Pixelkin
        INFOPLIST_KEY_CFBundleDisplayName: Pixelkin
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.entertainment"
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0.0"
        CODE_SIGN_ENTITLEMENTS: Pixelkin/Pixelkin.entitlements
        CODE_SIGN_STYLE: Automatic
        ENABLE_APP_SANDBOX: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # 不在 Dock 显示图标（纯菜单栏应用）
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSCalendarsUsageDescription: Pixelkin 需要访问日历以便从聊天中创建系统日程。
        INFOPLIST_KEY_NSRemindersUsageDescription: Pixelkin 需要访问提醒事项以便从聊天中创建待办提醒。
